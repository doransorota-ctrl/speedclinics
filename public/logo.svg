<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" width="1400" height="933">
  <defs>
    <style>
      .logo-text {
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 32px;
        font-weight: 300;
        letter-spacing: 0.6em;
        fill: #C9998A;
        text-anchor: middle;
      }
      .logo-mark {
        fill: none;
        stroke: #C9998A;
        stroke-width: 14;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>
  
  <rect width="1400" height="933" fill="#ffffff" />
  
  <g transform="translate(700, 380)">
      <path class="logo-mark" d="M 100, 30
               L -30, 30
               L -30, 90
               L 100, 90
               L 100, 150
               L -100, 150
               L -100, -30
               L 100, -30" />
  </g>
  
  <text class="logo-text" x="710" y="660">SPEED CLINICS</text>
</svg>
