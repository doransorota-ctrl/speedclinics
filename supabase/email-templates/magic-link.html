<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Je inloglink</title>
</head>
<body style="margin:0;padding:0;background-color:#f8f9fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f8f9fa;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:#ffffff;border-radius:16px;border:1px solid #e5e7eb;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="padding:32px 32px 24px 32px;text-align:center;">
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto;">
                <tr>
                  <td style="width:36px;height:36px;background-color:#25a867;border-radius:8px;text-align:center;vertical-align:middle;">
                    <span style="color:#ffffff;font-size:20px;line-height:36px;">&#9889;</span>
                  </td>
                  <td style="padding-left:10px;font-size:18px;font-weight:700;color:#111827;">
                    clŷniq
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Content -->
          <tr>
            <td style="padding:0 32px 32px 32px;">
              <h1 style="margin:0 0 8px 0;font-size:22px;font-weight:700;color:#111827;text-align:center;">
                Je inloglink
              </h1>
              <p style="margin:0 0 24px 0;font-size:15px;line-height:1.6;color:#6b7280;text-align:center;">
                Klik op de knop hieronder om in te loggen bij je clŷniq dashboard. Deze link is 1 uur geldig.
              </p>
              <!-- Button -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;padding:14px 32px;background-color:#25a867;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;border-radius:8px;">
                      Inloggen
                    </a>
                  </td>
                </tr>
              </table>
              <!-- Subtext -->
              <p style="margin:24px 0 0 0;font-size:13px;line-height:1.5;color:#9ca3af;text-align:center;">
                Heb je niet geprobeerd in te loggen? Dan kun je deze e-mail veilig negeren.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:20px 32px;border-top:1px solid #f3f4f6;text-align:center;">
              <p style="margin:0;font-size:12px;color:#9ca3af;">
                &copy; {{ .SiteURL }} &middot; clŷniq
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
